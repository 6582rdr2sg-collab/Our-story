<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La mulți ani, inima! ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffd6e7,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,100,.2);
width:90%;
max-width:400px;
}

h1{
color:#ff2e7a;
}

input{
padding:12px;
width:90%;
border-radius:10px;
border:2px solid pink;
font-size:18px;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:12px;
background:#ff4d88;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff2d73;
}

.heart{
position:absolute;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="card">

<h1>❤️ La mulți ani, inima! ❤️</h1>

<p>Introdu parola pentru a vedea surpriza.</p>

<input id="pass" type="password">

<br>

<button onclick="check()">Deschide ❤️</button>

</div>

<script>

function check(){

if(document.getElementById("pass").value=="22.11.2025"){

window.location.href="index.html";

}else{

alert("Parolă greșită ❤️");

}

}

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*5)+"s";

h.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(h);

}

</script>

</body>
</html>
